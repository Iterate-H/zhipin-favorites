name: 功能建议
description: 想要新功能或改进？在这里提
title: "[FEAT] "
labels: ["enhancement", "needs-triage"]

body:
  - type: checkboxes
    id: search
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过已有 Issue，没有找到相同的建议
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      description: 描述你遇到的不便或痛点
      placeholder: "每次导出的 Excel 没有筛选功能，我需要手动加..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的效果
      description: 描述理想的解决方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你目前的替代方案
      description: 你现在怎么绕过这个问题的（如果有的话）

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 导出功能（收藏/搜索）
        - 导出格式（Excel/JSON/其他）
        - 新页面支持
        - UI/交互
        - 性能/稳定性
        - 其他
